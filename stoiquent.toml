[ui]
mode = "native"                    # "native" | "browser"

[llm]
default = "local-qwen"

[llm.providers.local-qwen]
type = "openai"
base_url = "http://localhost:11434/v1"
model = "qwen3:32b"
api_key = ""
supports_reasoning = true
native_tools = true                # false = prompt-based fallback

# Phase 2+ — parsed by config loader, wired in Phase 2
[skills]
paths = ["~/.agents/skills", "~/.stoiquent/skills"]

# Phase 2+ — parsed by config loader, wired in Phase 2
[sandbox]
backend = "auto"
container_runtime = "auto"
tool_timeout = 300.0

# Phase 4+ — parsed by config loader, wired in Phase 4
[persistence]
data_dir = "~/.stoiquent"

[agent]
iteration_limit = 25
